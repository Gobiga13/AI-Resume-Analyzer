<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ResumeIQ — Error</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <style>
    .error-page { min-height:80vh; display:flex; align-items:center; justify-content:center; padding:40px 24px; }
    .error-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-xl); box-shadow:var(--shadow-lg); padding:52px 44px; max-width:500px; width:100%; text-align:center; position:relative; overflow:hidden; }
    .error-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--red),#f87171); }
    .error-icon { width:70px; height:70px; background:var(--red-pale); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 22px; font-size:30px; }
    .error-title { font-size:22px; font-weight:800; color:var(--slate-900); letter-spacing:-.4px; margin-bottom:14px; }
    .error-msg { font-size:13px; color:#b91c1c; background:var(--red-pale); border:1px solid rgba(239,68,68,.2); border-radius:var(--radius-sm); padding:14px 18px; margin-bottom:20px; text-align:left; font-family:var(--mono); line-height:1.65; word-break:break-word; }
    .error-hint { font-size:13px; color:var(--slate-500); margin-bottom:28px; line-height:1.6; }
    .btn-home { display:inline-flex; align-items:center; gap:8px; background:var(--blue); color:white; text-decoration:none; font-family:var(--font); font-size:14px; font-weight:600; padding:0 28px; height:46px; border-radius:var(--radius-sm); box-shadow:0 4px 14px rgba(37,99,235,.3); transition:all var(--transition); }
    .btn-home:hover { background:#1d4ed8; transform:translateY(-1px); }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container">
      <div class="nav-inner">
        <a href="/" class="nav-logo">
          <div class="logo-mark">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
            </svg>
          </div>
          <span class="logo-text">Resume<span>IQ</span></span>
        </a>
        <div class="nav-badge" style="color:var(--red);background:var(--red-pale);border-color:rgba(239,68,68,.3);">Error</div>
      </div>
    </div>
  </nav>
  <div class="error-page">
    <div class="error-card">
      <div class="error-icon">⚠️</div>
      <div class="error-title">Something Went Wrong</div>
      <div class="error-msg">{{ message }}</div>
      <div class="error-hint">Please go back and make sure you selected a valid company, job title, and uploaded a PDF or DOCX resume.</div>
      <a href="/" class="btn-home">← Go Back &amp; Try Again</a>
    </div>
  </div>
</body>
</html>
